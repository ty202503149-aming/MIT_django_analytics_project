<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Academic Performance</title>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            margin: 0;
            background-color: #f3f4f6;
            color: #111827;
        }

        header {
            background-color: #111827;
            color: #f9fafb;
            padding: 14px 20px;
        }

        header h1 {
            margin: 0 0 6px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.95rem;
        }

        nav a {
            color: #e5e7eb;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        nav a:hover {
            border-color: #4b5563;
            background-color: #1f2937;
        }

        main {
            max-width: 1000px;
            margin: 24px auto;
            padding: 0 20px 40px 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 6px;
            padding: 18px 20px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5e7eb;
        }

        footer {
            border-top: 1px solid #e5e7eb;
            padding: 10px 20px;
            font-size: 0.85rem;
            color: #6b7280;
            text-align: center;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gaming Academic Performance Dashboard</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/analytics/">Analytics</a>
            <a href="/analytics/train/">Train Model</a>
            <a href="/analytics/predict/">Predict</a>
            <a href="/uploads/">Upload Dataset</a>
        </nav>
    </header>

    <main>
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MIT209 Gaming & Academic Performance</p>
    </footer>
</body>
</html>
