{% extends 'base.html' %}

{% block content %}
<h2>Upload dataset</h2>

<p>Upload a new Gaming_Academic_Performance.csv file or update the existing dataset.</p>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="dataset">Choose CSV file:</label>
    <input type="file" id="dataset" name="dataset" accept=".csv">
    <button type="submit">Upload</button>
</form>

<p>Later you can show upload status, validation errors, and summary of the new data.</p>
{% endblock %}
